  <body>
    <div id="root">
      <style>
        .splash-container {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #ffffff;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          z-index: 9999;
        }
        .splash-logo {
          width: 72px;
          height: 72px;
          margin-bottom: 20px;
          display: flex;
          align-items: center;
          justify-content: center;
          background: linear-gradient(135deg, #10b981, #059669);
          border-radius: 20px;
          color: white;
          font-size: 32px;
          font-weight: 800;
          box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
          animation: splash-pulse 1.8s infinite ease-in-out;
        }
        .splash-title {
          font-size: 22px;
          font-weight: 800;
          color: #0f172a;
          margin: 0 0 6px 0;
          letter-spacing: -0.025em;
        }
        .splash-subtitle {
          font-size: 12px;
          color: #64748b;
          margin: 0 0 28px 0;
          font-weight: 500;
        }
        .splash-spinner {
          width: 20px;
          height: 20px;
          border: 3px solid #e2e8f0;
          border-top-color: #10b981;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
        }
        @keyframes splash-pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.04); }
        }
        @keyframes splash-spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="splash-container">
        <div class="splash-logo">S</div>
        <h1 class="splash-title">SafeBite</h1>
        <p class="splash-subtitle">Connecting Food with Care</p>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
